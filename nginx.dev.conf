server_tokens off;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS + proxy 到 Vite dev server（NeuroSme）— 開發環境主入口
server {
    listen 8443 ssl;
    server_name ee.neurosme.ai;

    ssl_certificate     /etc/letsencrypt/live/ee.neurosme.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ee.neurosme.ai/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://host.docker.internal:5173;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}

# port 443 → NeuroSme 產品官網（website Vite dev server）
server {
    listen 443 ssl;
    server_name ee.neurosme.ai;

    ssl_certificate     /etc/letsencrypt/live/ee.neurosme.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ee.neurosme.ai/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # Widget + API → proxy 到 demo 環境（讓 iframe 同源，繞過 X-Frame-Options）
    location /widget/ {
        proxy_pass         https://host.docker.internal:4443;
        proxy_ssl_verify   off;
        proxy_set_header   Host              ee.neurosme.ai;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass         https://host.docker.internal:4443;
        proxy_ssl_verify   off;
        proxy_set_header   Host              ee.neurosme.ai;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    # /assets/ 和 registerSW.js：直接 proxy 到 demo (4443)
    # Vite dev mode 不用 /assets/ 路徑，不會衝突
    location /assets/ {
        proxy_pass         https://host.docker.internal:4443;
        proxy_ssl_verify   off;
        proxy_set_header   Host              ee.neurosme.ai;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location = /registerSW.js {
        proxy_pass         https://host.docker.internal:4443;
        proxy_ssl_verify   off;
        proxy_set_header   Host              ee.neurosme.ai;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location / {
        proxy_pass         http://host.docker.internal:5174;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}

