# HTTPS port 443 → reas-portal（portal.ee.neurosme.ai）
server {
    listen 443 ssl;
    server_name portal.ee.neurosme.ai;

    ssl_certificate     /etc/letsencrypt/live/ee.neurosme.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ee.neurosme.ai/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    client_max_body_size 50m;

    location / {
        proxy_pass         http://host.docker.internal:8088;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering    off;
    }
}

# HTTPS → demo.ee.neurosme.ai（Demo 環境 NeuroSme app）
server {
    listen 443 ssl;
    server_name demo.ee.neurosme.ai;

    ssl_certificate     /etc/letsencrypt/live/ee.neurosme.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ee.neurosme.ai/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # Widget iframe 允許任何父頁嵌入
    location /widget/ {
        add_header Content-Security-Policy "frame-ancestors *;" always;
        proxy_pass         https://host.docker.internal:4443;
        proxy_ssl_verify   off;
        proxy_set_header   Host              demo.ee.neurosme.ai;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass         https://host.docker.internal:4443;
        proxy_ssl_verify   off;
        proxy_set_header   Host              demo.ee.neurosme.ai;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }
}
