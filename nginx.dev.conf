server_tokens off;

# HTTP → HTTPS redirect（保留 certbot webroot 驗證路徑）
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS + proxy 到 Vite dev server（NeuroSme）— 開發環境主入口
server {
    listen 8443 ssl;
    server_name ee.neurosme.ai;

    ssl_certificate     /etc/letsencrypt/live/ee.neurosme.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ee.neurosme.ai/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://host.docker.internal:5173;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}

