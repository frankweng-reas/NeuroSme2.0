# NeuroSme On-Prem 完整部署
#
# ⚠ Repo 開發 compose 預設使用 ghcr.io/...:*:latest（需 Registry 權限）；對外發行之 on‑prem 套件為
#   docker-compose.onprem.yml + neurosme-*:<版本>（由 start.sh 之 docker load 載入）。
#   若以 scp 更新客戶機，請以「發行 tarball 版本」為底再合併 backend.extra_hosts／註解，勿將本檔直接覆蓋至僅載入離線鏡像的環境（會強制 docker pull）。
#
# 架構：
#   caddy (port 443 HTTPS / port 80 → redirect) → frontend / backend / localauth
#   backend → neurosme-db (postgres)
#   localauth → localauth-db (postgres)
#
# 客戶 IT 操作指南：
#   啟動：  bash start.sh（互動式設定 domain/IP 並自動啟動）
#   升級：  解壓新版後執行 bash start.sh（資料不受影響）
#   備份：  ~/neurosme-data/  目錄定期備份即可（Mac / Linux 皆適用）
#
# Ollama 與 NeuroSme 同機（後端在 Docker 內）時，管理後台 LLM「API Base URL」請填：
#   http://host.docker.internal:11434
#   （勿填本機 Tailscale / 公網 IP:11434，避免 hairpin 逾時；backend 已掛 host.docker.internal → 主機）
#
# ⚠ 禁止修改本檔案內的 secrets（已由 REAS 預先設定）

services:

  # ── 外層反向代理（含 TLS） ───────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
    depends_on:
      - frontend
      - backend
      - localauth

  # ── 前端（React SPA） ────────────────────────────────────────
  frontend:
    image: ghcr.io/frankweng-reas/neurosme-frontend:latest
    restart: unless-stopped
    # 不暴露 port 給外部；透過 nginx 路由

  # ── NeuroSme 後端 ────────────────────────────────────────────
  backend:
    image: ghcr.io/frankweng-reas/neurosme-backend:latest
    restart: unless-stopped
    # 讓容器內固定用 host.docker.internal 連主機上的 Ollama（網段隨 compose 變化仍可用）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://neurosme:a3f8e2c1d74b96054e1f2c3d4a5b6c7d@neurosme-db:5432/neurosme
      JWT_SECRET: db0b7dde5c731381ba4aac77eb2640a9f74bf2efb20cdf9b3e51e9280b3faeb8
      LLM_ENCRYPTION_KEY: bshN1sbIbaws0gJzDk6AsFtjSNSjo_5DzUfR_zFos68=
      ACTIVATION_SECRET: b00874c6cef87073f86b1ef7b462ca0a65f5b78eda8e451a942b2e16c075b866
      LOCALAUTH_ADMIN_URL: http://localauth:4000
      LOCALAUTH_ADMIN_API_KEY: d21c4782231ea69c3223597d6d7df6d8210b0cae7c3c4e36ce11327d9aac7752
      CORS_ORIGINS: '["http://localhost", "http://localhost:80"]'
      # 若客戶從其他網域嵌入 API，請將該網域加入此清單
      # 例："http://localhost", "http://localhost:80", "https://erp.acme.com"
      EXPOSE_COMPUTE_ERROR_DETAIL: "false"
    volumes:
      - ${HOME}/neurosme-data/stored_files:/app/data/stored_files
      - ${HOME}/neurosme-data/duckdb:/app/data/duckdb
    depends_on:
      neurosme-db:
        condition: service_healthy

  # ── NeuroSme 資料庫 ──────────────────────────────────────────
  neurosme-db:
    image: ghcr.io/frankweng-reas/neurosme2-postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: neurosme
      POSTGRES_PASSWORD: a3f8e2c1d74b96054e1f2c3d4a5b6c7d
      POSTGRES_DB: neurosme
    volumes:
      - ${HOME}/neurosme-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurosme"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── LocalAuth（認證服務） ─────────────────────────────────────
  localauth:
    image: ghcr.io/frankweng-reas/localauth:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://localauth:ccb7e57879127b441728934b2fa56dc3db1d40ceae05084c@localauth-db:5432/localauth
      JWT_SECRET: db0b7dde5c731381ba4aac77eb2640a9f74bf2efb20cdf9b3e51e9280b3faeb8
      JWT_ACCESS_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      BASE_URL: ""
      PORT: 4000
      DEPLOY_MODE: onprem
      ADMIN_API_KEY: d21c4782231ea69c3223597d6d7df6d8210b0cae7c3c4e36ce11327d9aac7752
      DEFAULT_ADMIN_EMAIL: admin@local.dev
      DEFAULT_ADMIN_PASSWORD: Admin1234!
      AD_ENABLED: false
      EMAIL_PROVIDER: console
    depends_on:
      localauth-db:
        condition: service_healthy

  # ── LocalAuth 資料庫 ─────────────────────────────────────────
  localauth-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: localauth
      POSTGRES_PASSWORD: ccb7e57879127b441728934b2fa56dc3db1d40ceae05084c
      POSTGRES_DB: localauth
    volumes:
      - ${HOME}/neurosme-data/localauth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localauth"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:   # Caddy 自動憑證（Let's Encrypt）儲存用；自備憑證模式下此 volume 為空
