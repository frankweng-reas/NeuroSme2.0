# 開發用：僅跑 PostgreSQL，Backend / Frontend 本地執行
services:
  postgres-neurosme2:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: neurosme2-postgres:16
    container_name: neurosme2.0
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neurosme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-neurosme2}
    ports:
      - "5434:5432"
    volumes:
      - postgres_neurosme2_data:/var/lib/postgresql/data

volumes:
  postgres_neurosme2_data:
