server_tokens off;

server {
    listen 4443 ssl;
    server_name ee.neurosme.ai;

    ssl_certificate     /etc/letsencrypt/live/ee.neurosme.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ee.neurosme.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # X-Frame-Options 移除：demo 環境（4443）設計用來被 iframe 嵌入
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # API → demo backend（SSE 需關閉 proxy buffering）
    location /api/ {
        proxy_pass         http://demo-backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_buffering    off;          # SSE 串流必須關閉
        proxy_cache        off;
        proxy_set_header   Connection "";
    }

    # Auth → LocalAuth（Docker 容器，用 host-gateway）
    location /auth/ {
        proxy_pass         http://host.docker.internal:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        # reset-password 頁面由前端 SPA 提供
        location /auth/reset-password {
            try_files $uri /index.html;
        }
    }

    # 前端 SPA（靜態 build）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Widget 路徑允許跨域 iframe 嵌入（明確宣告，不依賴「未設 = 預設允許」）
    location /widget/ {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Content-Security-Policy   "frame-ancestors *;"                  always;
        root /usr/share/nginx/html;
        rewrite ^ /index.html break;
    }
}
